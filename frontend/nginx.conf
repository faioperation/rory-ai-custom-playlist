# =============================================================================
# Frontend nginx SPA configuration
# Serves the Vite-built React app with proper client-side routing support.
# This config is used INSIDE the frontend container only.
# The root nginx reverse proxy (nginx/nginx.conf) sits in front of this.
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression for text assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Long-term cache for hashed static assets (Vite fingerprints filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # React Router SPA: all paths fall back to index.html
    # (mirrors the vercel.json rewrite rule: source "/(.*)" → destination "/")
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable access log for favicon to reduce noise
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
