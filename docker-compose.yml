# =============================================================================
# Soundtrack My Night — Development Docker Compose
# =============================================================================
# Purpose : Local development with hot-reload for all three services.
# Usage   : docker compose up --build
#
# Services:
#   mongo    — MongoDB 7 (local data volume, no auth for dev simplicity)
#   backend  — Node.js + nodemon (hot-reload via src/ volume mount)
#   ai       — FastAPI + uvicorn --reload (hot-reload via ./ volume mount)
#   frontend — Vite dev server (hot-reload via src/ volume mount)
#
# Exposed ports (host → container):
#   27017:27017  MongoDB (optional, for direct DB access with Compass etc.)
#   3000:3000    Backend API
#   8000:8000    AI Service
#   5173:5173    Frontend Vite dev server
#
# Requirements:
#   - Copy backend/.env.example  → backend/.env   and fill in values
#   - Copy ai/.env.example       → ai/.env        and fill in values
#   - Copy frontend/.env.example → frontend/.env  and fill in values
# =============================================================================

services:

  # ── MongoDB (local dev only — use Atlas in production) ─────────────────────
  mongo:
    image: mongo:7.0
    container_name: smn_mongo_dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_dev_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: smn_db
    networks:
      - smn_dev_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Backend — Node.js + Express (nodemon hot-reload) ──────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development           # Uses the 'development' stage in the Dockerfile
    container_name: smn_backend_dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Mount src for hot-reload — node_modules stays inside container
      - ./backend/src:/app/src
      # Persistent uploads across container restarts (dev)
      - ./backend/uploads:/app/uploads
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      # Override MONGO_URI to use the local mongo container
      MONGO_URI: mongodb://mongo:27017/smn_db
      # AI_ENDPOINT points to the AI service container
      AI_ENDPOINT: http://ai:8000
      # Wait for mongo before starting (uses docker-entrypoint.sh logic indirectly)
      WAIT_HOSTS: mongo:27017
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - smn_dev_network

  # ── AI Service — FastAPI + uvicorn --reload ────────────────────────────────
  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: smn_ai_dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Mount entire ai/ directory for hot-reload
      - ./ai:/app
    env_file:
      - ./ai/.env
    environment:
      PYTHONUNBUFFERED: "1"
    # Override CMD to use --reload for development
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    networks:
      - smn_dev_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend — Vite dev server (HMR on port 5173) ─────────────────────────
  # NOTE: VITE_BACKEND_URL must be accessible FROM THE BROWSER (host machine),
  # so it is set to http://localhost:3000 (host port, not container hostname).
  frontend:
    image: node:20-alpine
    container_name: smn_frontend_dev
    working_dir: /app
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # Keep node_modules inside the container, not host-mounted
      - frontend_node_modules:/app/node_modules
    env_file:
      - ./frontend/.env
    environment:
      # Vite dev server must bind to 0.0.0.0 to be accessible from host
      VITE_HOST: "0.0.0.0"
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    networks:
      - smn_dev_network

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  mongo_dev_data:
    driver: local
  frontend_node_modules:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  smn_dev_network:
    driver: bridge
    name: smn_dev_network
