# =============================================================================
# Root Nginx Reverse Proxy Configuration
# =============================================================================
# Sits in front of all services in PRODUCTION (docker-compose.prod.yml).
# Routes:
#   /api/*               → backend:3000   (Node.js Express API)
#   /uploads/*           → backend:3000   (Multer static file serving)
#   /health              → nginx 200 OK   (nginx-level health check)
#   everything else      → frontend:80    (React SPA via nginx)
#
# The Stripe webhook route (/api/v1/stripe/payment/webhook) gets
# proxy_request_buffering off so the raw body reaches the backend intact.
# =============================================================================

# Upstream definitions (Docker Compose service names)
upstream backend {
    server backend:3000;
    keepalive 32;
}

upstream frontend {
    server frontend:80;
    keepalive 16;
}

# ── Rate limiting zones ────────────────────────────────────────────────────────
# Limit general API usage to 20 req/s per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
# Limit auth endpoints more aggressively
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

server {
    listen 80;
    server_name _;

    # File size limit — multer allows max 2 MB per upload, add overhead
    client_max_body_size 10M;

    # Connection timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options   "nosniff"                       always;
    add_header X-XSS-Protection         "1; mode=block"                 always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_types
        text/plain text/css application/json
        application/javascript text/javascript
        image/svg+xml application/xml;

    # ── nginx-level health check (no backend required) ─────────────────────────
    location = /health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"ok","service":"nginx"}';
    }

    # ── Stripe webhook — raw body passthrough ──────────────────────────────────
    # Must come BEFORE the general /api/ block (more specific match wins).
    # proxy_request_buffering off ensures the raw binary body Stripe sends
    # for signature verification reaches Express intact.
    location = /api/v1/stripe/payment/webhook {
        proxy_pass              http://backend;
        proxy_http_version      1.1;
        proxy_request_buffering off;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Connection         "";
    }

    # ── Auth endpoints — stricter rate limit ───────────────────────────────────
    location ~ ^/api/v1/auth/(login|register|forgot-password) {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass              http://backend;
        proxy_http_version      1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Connection         "";
    }

    # ── General API proxy ──────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;
        limit_req_status 429;

        proxy_pass              http://backend;
        proxy_http_version      1.1;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         "";
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_cache_bypass                  $http_upgrade;
    }

    # ── Uploaded files (served by Express static middleware) ───────────────────
    location /uploads/ {
        proxy_pass              http://backend;
        proxy_http_version      1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Connection         "";

        # Cache uploaded images at the proxy level
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── React SPA (all other paths) ────────────────────────────────────────────
    location / {
        proxy_pass              http://frontend;
        proxy_http_version      1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Connection         "";
    }
}
